spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update  # or 'none' or 'create' depending on your needs
    database-platform: org.hibernate.dialect.PostgreSQLDialect  # Explicitly setting the dialect
